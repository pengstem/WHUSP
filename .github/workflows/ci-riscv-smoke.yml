name: CI RISC-V Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-riscv-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BINDGEN_EXTRA_CLANG_ARGS: --sysroot=/opt/riscv64-linux-musl-cross/riscv64-linux-musl -I/opt/riscv64-linux-musl-cross/riscv64-linux-musl/include
  BINDGEN_EXTRA_CLANG_ARGS_riscv64gc_unknown_none_elf: --sysroot=/opt/riscv64-linux-musl-cross/riscv64-linux-musl -I/opt/riscv64-linux-musl-cross/riscv64-linux-musl/include

jobs:
  official-image-smoke:
    runs-on: ubuntu-latest
    container:
      image: zhouzhouyi/os-contest:20260104
    steps:
      - uses: actions/checkout@v4

      - name: Mark checkout as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare musl cross include path for lwext4 bindgen
        run: |
          mkdir -p /usr/riscv64-linux-musl/lib/musl
          ln -sfn /opt/riscv64-linux-musl-cross/riscv64-linux-musl/include /usr/riscv64-linux-musl/lib/musl/include

      - name: Build RISC-V artifacts in official image
        run: |
          make kernel-rv
          make disk.img
          test -f kernel-rv
          test -f disk.img

      - name: Boot with official RISC-V device shape
        shell: bash
        run: |
          set +e
          set -o pipefail
          timeout 15s qemu-system-riscv64 \
            -machine virt \
            -kernel ./kernel-rv \
            -m 1G \
            -nographic \
            -smp 1 \
            -bios default \
            -drive file=./disk.img,if=none,format=raw,id=x0 \
            -device virtio-blk-device,drive=x0,bus=virtio-mmio-bus.0 \
            -no-reboot \
            -device virtio-net-device,netdev=net \
            -netdev user,id=net \
            -rtc base=utc \
            2>&1 | tee boot.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ "${status}" != "0" && "${status}" != "124" ]]; then
            exit "${status}"
          fi
          grep -q "KERN: gpu device unavailable" boot.log
          grep -q "KERN: keyboard device unavailable" boot.log
          grep -q "KERN: mouse device unavailable" boot.log
          grep -q "Rust user shell" boot.log

      - name: Boot with auxiliary disk bootstrap fallback
        shell: bash
        run: |
          set +e
          set -o pipefail
          cp disk.img primary-test.img
          timeout 15s qemu-system-riscv64 \
            -machine virt \
            -kernel ./kernel-rv \
            -m 1G \
            -nographic \
            -smp 1 \
            -bios default \
            -drive file=./primary-test.img,if=none,format=raw,id=x0 \
            -device virtio-blk-device,drive=x0,bus=virtio-mmio-bus.0 \
            -no-reboot \
            -device virtio-net-device,netdev=net \
            -netdev user,id=net \
            -rtc base=utc \
            -drive file=./disk.img,if=none,format=raw,id=x1 \
            -device virtio-blk-device,drive=x1,bus=virtio-mmio-bus.1 \
            2>&1 | tee aux-boot.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ "${status}" != "0" && "${status}" != "124" ]]; then
            exit "${status}"
          fi
          grep -q "Rust user shell" aux-boot.log

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riscv-smoke-logs
          path: |
            boot.log
            aux-boot.log
          if-no-files-found: error
