name: Contest Gap

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: contest-gap-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  contest-gap:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: zhouzhouyi/os-contest:20260104
    env:
      BINDGEN_EXTRA_CLANG_ARGS: --sysroot=/opt/riscv64-linux-musl-cross/riscv64-linux-musl -I/opt/riscv64-linux-musl-cross/riscv64-linux-musl/include
      BINDGEN_EXTRA_CLANG_ARGS_riscv64gc_unknown_none_elf: --sysroot=/opt/riscv64-linux-musl-cross/riscv64-linux-musl -I/opt/riscv64-linux-musl-cross/riscv64-linux-musl/include
    steps:
      - uses: actions/checkout@v4

      - name: Mark checkout as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare musl cross include path for lwext4 bindgen
        run: |
          mkdir -p /usr/riscv64-linux-musl/lib/musl
          ln -sfn /opt/riscv64-linux-musl-cross/riscv64-linux-musl/include /usr/riscv64-linux-musl/lib/musl/include

      - name: Run contest entry build and summarize gap
        shell: bash
        run: |
          set -euo pipefail
          make all

          rv_status=missing
          la_status=missing
          disk_status=missing

          [[ -f kernel-rv ]] && rv_status=present
          [[ -f kernel-la ]] && la_status=present
          [[ -f disk.img ]] && disk_status=present

          {
            echo "## Contest artifact gap"
            echo ""
            echo "| Artifact | Status |"
            echo "| --- | --- |"
            echo "| kernel-rv | ${rv_status} |"
            echo "| kernel-la | ${la_status} |"
            echo "| disk.img | ${disk_status} |"
          } >> "$GITHUB_STEP_SUMMARY"

          [[ -f kernel-rv ]]
          [[ -f kernel-la ]]
