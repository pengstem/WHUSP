name: Docs Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-docs:
    runs-on: ubuntu-latest
    container:
      image: zhouzhouyi/os-contest:20260104
    env:
      BINDGEN_EXTRA_CLANG_ARGS: --sysroot=/opt/riscv64-linux-musl-cross/riscv64-linux-musl -I/opt/riscv64-linux-musl-cross/riscv64-linux-musl/include
      BINDGEN_EXTRA_CLANG_ARGS_riscv64gc_unknown_none_elf: --sysroot=/opt/riscv64-linux-musl-cross/riscv64-linux-musl -I/opt/riscv64-linux-musl-cross/riscv64-linux-musl/include
    steps:
      - uses: actions/checkout@v4

      - name: Mark checkout as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare musl cross include path for lwext4 bindgen
        run: |
          mkdir -p /usr/riscv64-linux-musl/lib/musl
          ln -sfn /opt/riscv64-linux-musl-cross/riscv64-linux-musl/include /usr/riscv64-linux-musl/lib/musl/include

      - name: Build docs
        run: |
          cd os
          cargo doc --no-deps --quiet

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: os/target/riscv64gc-unknown-none-elf/doc

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
